name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-services:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t turbine-backend ./backend

      - name: Build simulator Docker image
        run: docker build -t turbine-simulator ./simulator

      - name: Build ML service Docker image
        run: docker build -t turbine-ml-service ./ml-service

      - name: Validate Docker Compose config
        run: docker compose config
